services:
  postgres:
    image: postgres:16
    container_name: calory-postgres
    restart: always
    environment:
      POSTGRES_DB: calory_db
      POSTGRES_PASSWORD: password
      POSTGRES_USER: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
volumes:
  postgres_data: